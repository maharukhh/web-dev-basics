<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flower Bouquet</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 20%, #fff7e6 0%, #ffe0c2 35%, #ffc1a1 60%, #f7a1c4 85%, #d68fd6 100%);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    overflow: hidden;
  }
  .stage {
    position: relative;
    width: 700px;
    max-width: 95vw;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 25px 25px rgba(80, 40, 20, 0.25));
  }
  .caption {
    text-align: center;
    margin-top: -10px;
    font-size: 15px;
    color: #7a4a3a;
    letter-spacing: 1px;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="stage">
<svg viewBox="0 0 700 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background glow -->
    <radialGradient id="bgGlow" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff9ec"/>
      <stop offset="45%" stop-color="#ffe3c7"/>
      <stop offset="75%" stop-color="#ffb3c6"/>
      <stop offset="100%" stop-color="#d896e0"/>
    </radialGradient>

    <!-- Vase gradient -->
    <linearGradient id="vaseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8fd6c9"/>
      <stop offset="50%" stop-color="#bdeee2"/>
      <stop offset="100%" stop-color="#6cc0b2"/>
    </linearGradient>

    <!-- Rose petal gradients -->
    <radialGradient id="roseRed" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff8fa3"/>
      <stop offset="55%" stop-color="#e8375f"/>
      <stop offset="100%" stop-color="#a3123f"/>
    </radialGradient>
    <radialGradient id="rosePink" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffe1ef"/>
      <stop offset="55%" stop-color="#ff9ec7"/>
      <stop offset="100%" stop-color="#e05d95"/>
    </radialGradient>
    <radialGradient id="roseYellow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff6c9"/>
      <stop offset="55%" stop-color="#ffd23f"/>
      <stop offset="100%" stop-color="#e8961a"/>
    </radialGradient>

    <!-- Tulip gradients -->
    <linearGradient id="tulipPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a0ff"/>
      <stop offset="100%" stop-color="#7b3fd6"/>
    </linearGradient>
    <linearGradient id="tulipOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffbf7a"/>
      <stop offset="100%" stop-color="#f2621a"/>
    </linearGradient>
    <linearGradient id="tulipWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0d9ff"/>
    </linearGradient>

    <!-- Sunflower gradient -->
    <radialGradient id="sunflowerCenter" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#7a4a1e"/>
      <stop offset="100%" stop-color="#4a2c10"/>
    </radialGradient>

    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fd694"/>
      <stop offset="100%" stop-color="#3f9556"/>
    </linearGradient>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <rect x="0" y="0" width="700" height="800" fill="url(#bgGlow)"/>

  <!-- soft floating bokeh circles for a dreamy background -->
  <g opacity="0.35">
    <circle cx="90" cy="120" r="26" fill="#ffd9e8"/>
    <circle cx="600" cy="90" r="18" fill="#ffe9b0"/>
    <circle cx="640" cy="260" r="34" fill="#e6c8ff"/>
    <circle cx="60" cy="300" r="14" fill="#fff2c2"/>
    <circle cx="520" cy="60" r="10" fill="#ffffff"/>
    <circle cx="150" cy="60" r="12" fill="#ffffff"/>
  </g>

  <!-- soft ground shadow -->
  <ellipse cx="350" cy="740" rx="230" ry="30" fill="#7a4a3a" opacity="0.18"/>

  <!-- ============ VASE ============ -->
  <path d="M280 620 L270 720 Q350 745 430 720 L420 620 Z" fill="url(#vaseGrad)" stroke="#4f9e8e" stroke-width="2"/>
  <ellipse cx="350" cy="620" rx="70" ry="14" fill="#dff7f1" stroke="#4f9e8e" stroke-width="2"/>
  <ellipse cx="350" cy="618" rx="70" ry="12" fill="#a9e6d8"/>

  <!-- ============ STEMS ============ -->
  <g stroke="#3f9556" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M330 620 Q300 520 250 400"/>
    <path d="M345 620 Q330 500 300 340"/>
    <path d="M355 620 Q365 500 400 360"/>
    <path d="M365 620 Q400 520 450 420"/>
    <path d="M350 615 Q350 480 350 300"/>
    <path d="M340 620 Q290 560 220 480"/>
    <path d="M362 620 Q420 560 480 500"/>
  </g>

  <!-- leaves along stems -->
  <g fill="url(#leafGrad)">
    <ellipse cx="290" cy="520" rx="22" ry="9" transform="rotate(-35 290 520)"/>
    <ellipse cx="400" cy="500" rx="22" ry="9" transform="rotate(30 400 500)"/>
    <ellipse cx="330" cy="450" rx="20" ry="8" transform="rotate(-15 330 450)"/>
    <ellipse cx="260" cy="450" rx="18" ry="8" transform="rotate(-55 260 450)"/>
    <ellipse cx="430" cy="460" rx="18" ry="8" transform="rotate(50 430 460)"/>
  </g>

  <!-- ============ FLOWERS ============ -->

  <!-- ---- Sunflower (back center) ---- -->
  <g transform="translate(350,300)">
    <g id="sunPetals" fill="#ffcc33">
      <!-- 12 petals -->
      <g>
        <ellipse cx="0" cy="-70" rx="16" ry="34"/>
        <ellipse cx="0" cy="-70" rx="16" ry="34" transform="rotate(30)"/>
        <ellipse cx="0" cy="-70" rx="16" ry="34" transform="rotate(60)"/>
        <ellipse cx="0" cy="-70" rx="16" ry="34" transform="rotate(90)"/>
        <ellipse cx="0" cy="-70" rx="16" ry="34" transform="rotate(120)"/>
        <ellipse cx="0" cy="-70" rx="16" ry="34" transform="rotate(150)"/>
        <ellipse cx="0" cy="-70" rx="16" ry="34" transform="rotate(180)"/>
        <ellipse cx="0" cy="-70" rx="16" ry="34" transform="rotate(210)"/>
        <ellipse cx="0" cy="-70" rx="16" ry="34" transform="rotate(240)"/>
        <ellipse cx="0" cy="-70" rx="16" ry="34" transform="rotate(270)"/>
        <ellipse cx="0" cy="-70" rx="16" ry="34" transform="rotate(300)"/>
        <ellipse cx="0" cy="-70" rx="16" ry="34" transform="rotate(330)"/>
      </g>
    </g>
    <circle cx="0" cy="0" r="38" fill="url(#sunflowerCenter)"/>
    <g fill="#6b3a12" opacity="0.6">
      <circle cx="-10" cy="-8" r="2"/><circle cx="5" cy="-14" r="2"/><circle cx="14" cy="2" r="2"/>
      <circle cx="0" cy="10" r="2"/><circle cx="-14" cy="6" r="2"/><circle cx="10" cy="-2" r="2"/>
      <circle cx="-4" cy="14" r="2"/><circle cx="-16" cy="-6" r="2"/>
    </g>
  </g>

  <!-- ---- Rose (red), left ---- -->
  <g transform="translate(250,400) scale(1.05)">
    <circle cx="0" cy="0" r="34" fill="url(#roseRed)"/>
    <path d="M0,-26 C14,-22 20,-8 12,4 C20,-2 26,10 14,20 C22,16 22,30 8,30
             C16,34 4,42 -8,32 C-4,40 -20,38 -20,24 C-28,28 -30,14 -18,8
             C-28,6 -24,-10 -10,-8 C-16,-16 -8,-28 0,-26 Z"
          fill="#c41c50" opacity="0.55"/>
  </g>

  <!-- ---- Rose (pink), right ---- -->
  <g transform="translate(450,420) scale(0.95)">
    <circle cx="0" cy="0" r="32" fill="url(#rosePink)"/>
    <path d="M0,-24 C13,-20 18,-7 11,4 C18,-1 24,9 13,18 C20,15 20,28 7,27
             C14,31 4,38 -7,29 C-3,36 -18,34 -18,22 C-25,25 -27,13 -16,7
             C-25,5 -22,-9 -9,-7 C-15,-15 -7,-26 0,-24 Z"
          fill="#c94f83" opacity="0.55"/>
  </g>

  <!-- ---- Rose (yellow), lower-right ---- -->
  <g transform="translate(480,500) scale(0.85)">
    <circle cx="0" cy="0" r="28" fill="url(#roseYellow)"/>
    <path d="M0,-20 C11,-17 15,-6 9,3 C15,-1 20,8 11,15 C17,13 17,24 6,23
             C12,26 3,32 -6,24 C-3,30 -15,29 -15,19 C-21,21 -23,11 -13,6
             C-21,4 -18,-8 -8,-6 C-12,-13 -6,-22 0,-20 Z"
          fill="#e0a814" opacity="0.5"/>
  </g>

  <!-- ---- Tulip (purple), far left ---- -->
  <g transform="translate(220,480)">
    <path d="M-16,10 C-16,-24 -6,-38 0,-42 C6,-38 16,-24 16,10 C16,10 8,-2 0,-2 C-8,-2 -16,10 -16,10 Z" fill="url(#tulipPurple)"/>
    <path d="M0,-42 C-3,-24 -3,-6 0,10 C3,-6 3,-24 0,-42 Z" fill="#5a1fb0" opacity="0.4"/>
  </g>

  <!-- ---- Tulip (orange), bottom center ---- -->
  <g transform="translate(300,540) scale(1.05)">
    <path d="M-16,10 C-16,-24 -6,-38 0,-42 C6,-38 16,-24 16,10 C16,10 8,-2 0,-2 C-8,-2 -16,10 -16,10 Z" fill="url(#tulipOrange)"/>
    <path d="M0,-42 C-3,-24 -3,-6 0,10 C3,-6 3,-24 0,-42 Z" fill="#c8420a" opacity="0.4"/>
  </g>

  <!-- ---- Tulip (white/lavender), right ---- -->
  <g transform="translate(410,470) scale(0.95)">
    <path d="M-16,10 C-16,-24 -6,-38 0,-42 C6,-38 16,-24 16,10 C16,10 8,-2 0,-2 C-8,-2 -16,10 -16,10 Z" fill="url(#tulipWhite)"/>
    <path d="M0,-42 C-3,-24 -3,-6 0,10 C3,-6 3,-24 0,-42 Z" fill="#b98be0" opacity="0.35"/>
  </g>

  <!-- ---- Small daisies scattered as filler flowers ---- -->
  <g id="daisy1" transform="translate(310,360) scale(0.7)">
    <g fill="#ffffff">
      <ellipse cx="0" cy="-18" rx="7" ry="16"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(45)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(90)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(135)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(180)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(225)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(270)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(315)"/>
    </g>
    <circle cx="0" cy="0" r="10" fill="#ffcc33"/>
  </g>

  <g id="daisy2" transform="translate(400,530) scale(0.6)">
    <g fill="#ffb3d9">
      <ellipse cx="0" cy="-18" rx="7" ry="16"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(45)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(90)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(135)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(180)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(225)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(270)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(315)"/>
    </g>
    <circle cx="0" cy="0" r="9" fill="#ff9f1c"/>
  </g>

  <g id="daisy3" transform="translate(470,440) scale(0.55)">
    <g fill="#cdb4ff">
      <ellipse cx="0" cy="-18" rx="7" ry="16"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(45)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(90)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(135)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(180)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(225)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(270)"/>
      <ellipse cx="0" cy="-18" rx="7" ry="16" transform="rotate(315)"/>
    </g>
    <circle cx="0" cy="0" r="8" fill="#ffe066"/>
  </g>

  <!-- small baby's breath filler dots -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="270" cy="360" r="4"/>
    <circle cx="290" cy="330" r="3.5"/>
    <circle cx="430" cy="360" r="4"/>
    <circle cx="460" cy="390" r="3.5"/>
    <circle cx="320" cy="470" r="3.5"/>
    <circle cx="380" cy="410" r="3"/>
    <circle cx="230" cy="430" r="3.5"/>
  </g>

  <!-- ribbon bow on vase -->
  <g transform="translate(350,628)">
    <path d="M0,0 C-25,-10 -35,10 -20,18 C-10,22 -4,10 0,0 Z" fill="#ff6f9c"/>
    <path d="M0,0 C25,-10 35,10 20,18 C10,22 4,10 0,0 Z" fill="#ff88ac"/>
    <circle cx="0" cy="2" r="6" fill="#e8497a"/>
  </g>
</svg>
<div class="caption">A handful of sunshine, wrapped in petals 🌻🌷🌹</div>
</div>
</body>
</html>
